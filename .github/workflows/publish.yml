name: Publish book to GitHub Pages

# Builds the interactive islands, renders the Quarto book, and deploys to Pages.
# Runs on a clean Ubuntu runner — no local toolchain / Dropbox-lock issues, and it
# rebuilds book/assets (which is gitignored) so the islands are present at render.

on:
  push:
    branches: [main]        # change to your deploy branch if different
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: components/package-lock.json

      - name: Build interactive islands
        working-directory: components
        run: |
          npm ci
          npm run build        # writes the gitignored book/assets/ bundle

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render book
        run: quarto render book

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/_book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
