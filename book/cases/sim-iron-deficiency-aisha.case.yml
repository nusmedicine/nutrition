        - Recognised the iron-deficiency-anaemia pattern in a classic at-risk group and explained the concern in plain, reassuring language without jargon or numbers.
        - 'Stayed within scope — recognise -> food-first -> refer: agreed a food-first step (iron-rich foods + vitamin C; avoid tea/coffee with meals) AND arranged testing / referral for the menstrual cause, rather than investigating or treating it directly.'
