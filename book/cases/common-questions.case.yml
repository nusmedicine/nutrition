id: common-questions
title: "Three questions in one clinic: carbs, fat and protein"
objectives:
  - "Answer common lay questions on carbohydrate, fat and protein on quality-over-quantity terms."
  - "Correct popular myths honestly — coconut oil, dietary cholesterol, 'more protein = more muscle'."
  - "Give quality guidance, anchor to My Healthy Plate, and know when to refer."
difficulty: intro
estimatedMinutes: 12
tags: [nutrition, macronutrients, counselling, myths]
start: intro
variables: { quality: 0 }

persona:
  name: "Mr Lim"
  age: 41
  sex: male
  occupation: "taxi driver"
  presentation: "Health screen showed a borderline fasting glucose and a mildly raised LDL. Feels well; eats mostly at hawker centres and coffee shops. Has picked up a lot of advice online and from friends."
  voice: "Chatty and well-meaning; trusts influencers and 'my friend also say'; wants clear yes/no answers; time-pressed."

nodes:
  - id: intro
    type: info
    title: "\"Doctor, I got three questions ah\""
    body: |
      Mr Lim's fasting glucose is borderline and his LDL is mildly up. He's motivated but
      has absorbed a lot of coffee-shop nutrition wisdom, and he rattles off three
      questions in one breath — one about rice, one about oils, one about his son's
      protein powder. Answer each on **quality, not bans**.
    next: q-carb

  - id: q-carb
    type: mcq
    stem: "*\"Is white rice the problem? Should I just cut all carbs — my friend went keto?\"*"
    options:
      - id: a
        text: "\"Yes — cut all rice and carbs, keto is best.\""
        correct: false
        feedback: "This throws out protective wholegrains, legumes and fibre with the refined starch. Keto/low-carb helps *short-term* weight and glucose but isn't a proven long-term win, can raise LDL, and a strict plan needs a dietitian."
        goto: reveal-carb
      - id: b
        text: "\"It's about the type — swap some white rice for brown/red rice, fill half the plate with vegetables, and keep the portion sensible.\""
        correct: true
        feedback: "Right — a hawker-available quality upgrade anchored to My Healthy Plate, not a ban. (Brown-vs-white is a modest, mostly observational benefit — worthwhile, not magic.)"
        effects: { quality: +1 }
        goto: reveal-carb
      - id: c
        text: "\"Rice is fine — eat as much white rice as you like.\""
        correct: false
        feedback: "A flood of refined starch is exactly what pushes glucose up. Portion and type still matter."
        goto: reveal-carb

  - id: reveal-carb
    type: info
    body: |
      You add that **whole fruit is fine** despite its sugar — it's the *sweet drinks*
      (bubble tea, sweetened kopi, even juice) that behave like added sugar. On to his
      next worry: cooking oils.
    next: q-fat

  - id: q-fat
    type: mcq
    stem: "*\"My friend says coconut oil is a superfood and butter is natural — I switched to those. Better for my cholesterol, right?\"*"
    options:
      - id: a
        text: "\"Yes, coconut oil and butter are healthy natural fats.\""
        correct: false
        feedback: "A myth worth correcting kindly. Coconut oil is ~90% saturated fat and **raises LDL** like other saturated fats — the 'superfood' halo isn't supported; butter is roughly two-thirds saturated. Neither is a heart-healthy default."
        goto: reveal-fat
      - id: b
        text: "\"Avoid all fat — go fat-free.\""
        correct: false
        feedback: "Too far. You need some fat for the essential fatty acids and fat-soluble vitamins; the move is to **swap** saturated for unsaturated, not slash all fat."
        goto: reveal-fat
      - id: c
        text: "\"Keep some fat, but use unsaturated oils (peanut, canola, olive) for everyday cooking; small amounts of coconut for flavour are fine.\""
        correct: true
        feedback: "Exactly — type over total. Correct the hype without banning: it's the *default* cooking fat that matters."
        effects: { quality: +1 }
        goto: reveal-fat

  - id: reveal-fat
    type: info
    body: |
      He also asks about eggs. You reassure him that for **most people** eggs are fine in
      moderation — **saturated and *trans* fat move blood cholesterol more than the
      cholesterol in food does** — while noting you'd individualise given his borderline
      glucose. Then his last question, about his son.
    next: q-protein

  - id: q-protein
    type: mcq
    stem: "*\"My son takes protein powder and eats chicken breast all day to build muscle. Does more protein mean more muscle? Should I take some for energy?\"*"
    options:
      - id: a
        text: "\"Yes — the more protein, the more muscle.\""
        correct: false
        feedback: "Only up to a point, and only *with* resistance training: extra protein helps muscle up to roughly 1.6 g/kg/day, beyond which it's just extra calories. Protein is permissive, not magic."
        goto: reveal-protein
      - id: b
        text: "\"Enough protein *plus* training builds muscle. Ordinary food (fish, egg, tofu, dhal, chicken) usually meets needs, powder is optional, and it's processed meats to cut back on.\""
        correct: true
        feedback: "Right — adequacy + training, whole foods first, powder as convenience not necessity, and the processed-meat point lands the quality theme."
        effects: { quality: +1 }
        goto: reveal-protein
      - id: c
        text: "\"Protein powder gives energy — take a few scoops a day to feel more energetic.\""
        correct: false
        feedback: "Protein isn't an energy supplement. Most people meet their needs from ordinary local food; there's no need to add powder."
        goto: reveal-protein

  - id: reveal-protein
    type: info
    body: |
      You round off the red-meat worry: **processed** meat (bacon, ham, luncheon meat) is
      the clearer risk signal (IARC Group 1) than unprocessed red meat (Group 2A) — so it's
      the processed stuff to trim first. The same thread ran through all three answers.
    next: route

  - id: route
    type: branch
    rules:
      - if: "quality >= 3"
        goto: talk-to-mr-lim
    else: remedial

  - id: talk-to-mr-lim
    type: patient-chat
    scenarioId: common-questions-mr-lim
    objective: "Agree one realistic change per theme and flag that a strict low-carb plan needs a dietitian."
    turnLimit: 8
    exitWhen: "patient agrees specific, safe changes and understands the referral"
    goto: end-good
    fallbackGoto: end-good

  - id: remedial
    type: info
    title: "Re-centre on quality"
    body: |
      The thread across all three questions is the same: **type and food source**, not
      blanket bans or hype. Anchor to My Healthy Plate, correct myths honestly, and refer
      when a plan is restrictive or therapeutic.
    next: end-partial

  - id: end-good
    type: end
    outcome: success
    title: "Quality over quantity — and knowing when to refer"
    body: |
      You answered a carbohydrate, a fat and a protein question on quality-not-quantity
      terms, corrected the coconut-oil and 'more-protein' hype honestly, and — because
      Mr Lim wants a strict low-carb plan on top of borderline glucose and lipids — agreed
      to refer him to a dietitian.
    debrief:
      objectivesMet: [1, 2, 3]
      keyPoints:
        - "Carbs, fat and protein all reduce to quality and food source — not blanket bans."
        - "Correct myths honestly: coconut oil raises LDL; dietary cholesterol matters less than sat/trans fat; processed meat is the stronger signal; protein builds muscle only with training, up to a point."
        - "Give quality guidance and local tools; don't prescribe grams; refer restrictive/therapeutic diets or higher-risk patients."

  - id: end-partial
    type: end
    outcome: partial
    title: "Most of the way"
    body: |
      You engaged all three questions but drifted toward all-or-nothing or hype on at least
      one. Replay and reframe each around quality and one realistic local swap — and
      remember the referral boundary.
    debrief:
      objectivesMet: [1]
      keyPoints:
        - "Lead with quality and food source, not 'good vs bad'."
        - "Anchor advice to My Healthy Plate and Nutri-Grade."
        - "Refer restrictive or therapeutic diets to a dietitian."
