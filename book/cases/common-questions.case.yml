id: common-questions
title: "Everyday questions in one clinic: carbs, fat and protein"
objectives:
  - "Answer common lay questions on carbohydrate, fat and protein on quality-over-quantity terms."
  - "Correct popular myths honestly — coconut oil, dietary cholesterol, 'more protein = more muscle'."
  - "Give quality guidance, anchor to My Healthy Plate, and know when to refer."
difficulty: intro
estimatedMinutes: 10
tags: [nutrition, macronutrients, counselling, myths]
start: intro
variables: { quality: 0 }

persona:
  name: "Mr Lim"
  age: 41
  sex: male
  occupation: "taxi driver"
  presentation: "Health screen showed a borderline fasting glucose and mildly high cholesterol. Feels well; eats mostly at hawker centres and coffee shops. Has picked up a lot of advice online and from friends."
  voice: "Chatty and well-meaning; trusts influencers and 'my friend also say'; wants clear yes/no answers; time-pressed."

nodes:
  - id: intro
    type: info
    title: "\"Doctor, I got a few questions ah\""
    body: |
      Mr Lim's fasting glucose is borderline and his cholesterol is mildly up. He feels well
      and is motivated, but he has absorbed a lot of coffee-shop nutrition wisdom, and he
      rattles off his worries one after another — about rice, about cooking oils, about eggs,
      and about his son's protein powder. Answer each on **quality, not bans**, and watch the
      same thread run through all four.
    next: q-carb

  - id: q-carb
    type: mcq
    stem: "*\"Is white rice the problem? Should I just cut all carbs — my friend went keto?\"*"
    options:
      - id: a
        text: "\"Yes — cut all rice and carbs, keto is best.\""
        correct: false
        feedback: "This throws out protective wholegrains, legumes and fibre along with the refined starch. Keto/low-carb can help weight and glucose *short-term* but isn't a proven long-term win, can push cholesterol up, and a strict plan needs a dietitian."
        goto: q-eggs
      - id: b
        text: "\"It's about the type — swap some white rice for brown/red rice, fill half the plate with vegetables, and keep the portion sensible.\""
        correct: true
        feedback: "Right — a hawker-available quality upgrade anchored to My Healthy Plate, not a ban. And reassure him: **whole fruit is fine** despite its sugar; it's the *sweet drinks* (bubble tea, sweetened kopi, even juice) that behave like added sugar."
        effects: { quality: +1 }
        goto: q-eggs
      - id: c
        text: "\"Rice is fine — eat as much white rice as you like.\""
        correct: false
        feedback: "A flood of refined starch is exactly what nudges glucose up. Portion and type still matter — this isn't a free pass."
        goto: q-eggs

  - id: q-eggs
    type: mcq
    stem: "*\"So no more eggs for me? I heard eggs are full of cholesterol, and mine is already high.\"*"
    options:
      - id: a
        text: "\"Yes, stop eating eggs — they'll raise your cholesterol.\""
        correct: false
        feedback: "A common mix-up worth correcting. The cholesterol *in food* moves blood cholesterol far less than **saturated and trans fat** do. For most people eggs are fine in moderation — it's the fatty, fried sides they come with that matter more."
        goto: q-fat
      - id: b
        text: "\"For most people eggs are fine in moderation — the cholesterol in food matters less than saturated and trans fat. We'll keep an eye on it given your borderline results.\""
        correct: true
        feedback: "Exactly — correct the myth without banning, and individualise. It's saturated and trans fat that move blood cholesterol most, not the cholesterol in the egg itself."
        effects: { quality: +1 }
        goto: q-fat
      - id: c
        text: "\"Cholesterol in food doesn't matter at all — eat as many as you like.\""
        correct: false
        feedback: "Almost — dietary cholesterol matters *less* than people fear, but 'doesn't matter at all' overshoots, and eggs are often eaten with fatty, fried extras. Moderation, and mind the company they keep."
        goto: q-fat

  - id: q-fat
    type: mcq
    stem: "*\"My friend says coconut oil is a superfood and butter is natural — I switched to those. Better for me, right?\"*"
    options:
      - id: a
        text: "\"Yes, coconut oil and butter are healthy natural fats.\""
        correct: false
        feedback: "A myth worth correcting kindly. Coconut oil is ~90% saturated fat and **raises cholesterol** like other saturated fats — the 'superfood' halo isn't supported; butter is roughly two-thirds saturated. Neither is a heart-healthy default."
        goto: q-protein
      - id: b
        text: "\"Avoid all fat — go fat-free.\""
        correct: false
        feedback: "Too far. You need some fat for the essential fatty acids and fat-soluble vitamins; the move is to **swap** saturated for unsaturated, not slash all fat."
        goto: q-protein
      - id: c
        text: "\"Keep some fat, but use unsaturated oils (peanut, canola, olive) for everyday cooking; small amounts of coconut for flavour are fine.\""
        correct: true
        feedback: "Exactly — type over total. Correct the hype without banning: it's the *default* cooking fat that matters."
        effects: { quality: +1 }
        goto: q-protein

  - id: q-protein
    type: mcq
    stem: "*\"Last one, doctor. My son takes protein powder and eats chicken breast all day to build muscle. Does more protein mean more muscle? Should I take some for energy?\"*"
    options:
      - id: a
        text: "\"Yes — the more protein, the more muscle.\""
        correct: false
        feedback: "Only up to a point, and only *with* resistance training: extra protein helps build muscle up to roughly 1.6 g/kg/day, beyond which it's just extra calories. Protein is permissive, not magic."
        goto: route
      - id: b
        text: "\"Enough protein *plus* training builds muscle. Ordinary food (fish, egg, tofu, dhal, chicken) usually meets needs, powder is optional — and it's processed meats (luncheon meat, bacon, sausages) to cut back on.\""
        correct: true
        feedback: "Right — adequacy + training, whole foods first, powder as convenience not necessity, and the processed-meat point lands the quality theme once more."
        effects: { quality: +1 }
        goto: route
      - id: c
        text: "\"Protein powder gives energy — take a few scoops a day to feel more energetic.\""
        correct: false
        feedback: "Protein isn't an energy supplement. Most people meet their needs from ordinary local food; there's no need to add powder."
        goto: route

  - id: route
    type: branch
    rules:
      - if: "quality >= 3"
        goto: talk-to-mr-lim
    else: remedial

  - id: talk-to-mr-lim
    type: patient-chat
    scenarioId: common-questions-mr-lim
    objective: "Agree one realistic change per theme, and — because he is keen on a strict low-carb plan on top of borderline glucose and cholesterol — flag that this is beyond simple diet advice and you would bring in a dietitian."
    turnLimit: 8
    exitWhen: "patient agrees specific, safe changes and understands the referral"
    goto: end-good
    fallbackGoto: end-good

  - id: remedial
    type: info
    title: "Re-centre on quality"
    body: |
      The thread across all four questions is the same: **type and food source**, not
      blanket bans or hype. Anchor to My Healthy Plate, correct myths honestly, and — when a
      plan turns restrictive or therapeutic, or the patient is higher-risk — know when to
      bring in a dietitian rather than prescribing it yourself.
    next: end-partial

  - id: end-good
    type: end
    outcome: success
    title: "Quality over quantity — and knowing when to refer"
    body: |
      You answered a carbohydrate, a cholesterol, a fat and a protein question on
      quality-not-quantity terms, corrected the coconut-oil, egg and 'more-protein' myths
      honestly, and — because Mr Lim wants a strict low-carb plan on top of borderline glucose
      and cholesterol — recognised this is beyond everyday advice and agreed to bring in a
      **dietitian**. *(When and how to assess, counsel and refer is the work of later chapters
      — Assessing Diet & Talking to Patients, Behaviour-Change Counselling, and
      Interprofessional Practice & Referral.)*
    debrief:
      objectivesMet: [1, 2, 3]
      keyPoints:
        - "Carbs, fat, cholesterol and protein all reduce to quality and food source — not blanket bans."
        - "Correct myths honestly: coconut oil raises cholesterol; the cholesterol in food matters less than saturated/trans fat; processed meat is the stronger signal; protein builds muscle only with training, up to a point."
        - "Give quality guidance and local tools; don't prescribe grams or restrictive plans; refer restrictive/therapeutic diets or higher-risk patients."

  - id: end-partial
    type: end
    outcome: partial
    title: "Most of the way"
    body: |
      You engaged all four questions but drifted toward all-or-nothing or hype on at least
      one. Replay and reframe each around **quality** and one realistic local swap — and
      remember the referral boundary when a plan turns restrictive.
    debrief:
      objectivesMet: [1]
      keyPoints:
        - "Lead with quality and food source, not 'good vs bad'."
        - "Anchor advice to My Healthy Plate and Nutri-Grade."
        - "Refer restrictive or therapeutic diets to a dietitian."
