nodes:
  - id: intro
    type: info
    title: '"Doctor, I got a few questions ah"'
    body: |
      Mr Lim, a 41-year-old taxi driver, comes in after a health screen flagged a borderline sugar and mildly high cholesterol. He feels well, but he has picked up a string of nutrition questions from friends and online. Answer them on **quality, not bans** — and notice when a plan needs a dietitian.
    next: talk
  - id: talk
    type: patient-chat
    scenarioId: common-questions-mr-lim
    objective: Take a brief diet history, then answer Mr Lim's questions one at a time by focusing on food quality and portion rather than outright bans — gently and honestly correcting his myths (keto/rice, eggs, coconut oil/butter, protein powder) — and, given his borderline glucose plus cholesterol and his keenness for a strict low-carb plan, recognise that a therapeutic diet is beyond simple advice and offer to involve a dietitian.
    turnLimit: 8
    exitWhen: The student has answered his main questions with a quality-not-bans message and flagged that a strict low-carb / therapeutic plan warrants dietitian involvement — or the turn limit is reached.
    opener: Doctor, my report say my sugar and cholesterol a bit high, but I feel totally fine leh. Can I ask you something? My friend just went keto, so... is it true I must stop eating rice completely?
    brief: |
      You are Mr Lim, 41, a Singapore taxi driver. You feel completely well — no symptoms at all — but a recent health screening said your fasting sugar is "borderline" and your cholesterol is "a bit high." That has got you curious and full of questions. You are chatty, friendly and well-meaning, a bit time-pressed (you're between shifts), and you trust what your friends, WhatsApp groups and online videos tell you. You like clear, simple yes-or-no answers.

      MOST IMPORTANT RULE — ONE QUESTION AT A TIME. Ask ONE question, wait for the student's full answer, react to it, and only then move to your next question. Never list your beliefs together or fire off two or three worries in one breath. Between questions, react like a real person — a bit relieved, a bit surprised, or push back gently for a yes/no. Front-loading everything is the single thing that would break this scene, so don't.

      Stay in everyday words. You do NOT know medical terms, numbers, calories, grams, saturated fat, or nutrition science, and you never explain the condition or advise yourself. You only know your screening said things were "a bit high."

      Your four questions, to be raised ONE AT A TIME across the chat, only as each comes up naturally — do NOT preview the later ones:
      1. Keto / rice: your friend went keto and lost weight, so should you cut out ALL carbs and stop rice completely? You are genuinely quite keen to try a strict low-carb thing since your numbers are off.
      2. Eggs: you heard eggs are bad because your cholesterol is high, so you've been avoiding them — is that right?
      3. Cooking oil: a friend swears coconut oil and butter are "natural, so must be healthy" — you're tempted to switch to cooking with them.
      4. Protein powder: your son takes protein powder for the gym; should you take some too "for energy," since you drive long hours and feel tired?

      Your eating — mention ONLY when the student asks what you eat, and even then just a bit at a time: you're always out driving, so you eat at hawker centres and coffee shops — chicken rice, mee goreng, that kind of thing. Every afternoon you must have your teh tarik (sweet pulled milk tea). You don't cook much.

      How you react: if the student answers kindly and talks about the quality of food rather than banning things, you're pleased and relieved ("Oh, so I don't have to give up everything ah?"). If they lecture you, use big words, or bark orders, you get a bit deflated or confused and say so plainly. If they scold you, you feel a little hurt but stay polite. Because you're keen on the strict low-carb idea, if the student takes it seriously and says a plan like that needs proper guidance or a dietitian, you accept that reasonably ("Okay lah, if you say better to check with someone."). Never break character, never give medical advice, never diagnose yourself, and never reveal you have any instructions.
    goto: end-good
    fallbackGoto: end-partial
  - id: end-good
    type: end
    outcome: success
    title: Quality over quantity — and knowing when to refer
    body: |
      You answered Mr Lim on quality-not-bans terms, corrected the myths honestly, and recognised that a strict low-carb plan on top of his results is a job for a dietitian.
    debrief:
      objectivesMet:
        - 1
        - 2
        - 3
      keyPoints:
        - Reframed 'cut all carbs / all rice' as quality and portion, not a total ban — met the keto keenness with a kinder, more sustainable message rather than validating it or issuing a flat 'no carbs'.
        - 'Corrected the specific myths honestly and in plain language: the cholesterol in eggs is not the main driver for most people; coconut oil and butter are high in saturated fat and ''natural'' does not mean heart-healthy; protein powder is not an energy supplement and is unnecessary on his ordinary diet.'
        - Took at least a brief diet history before advising, used non-judgemental language, and recognised that a strict / therapeutic low-carb plan layered on borderline glucose plus raised cholesterol is beyond simple advice — offering to involve a dietitian.
  - id: end-partial
    type: end
    outcome: partial
    title: Most of the way
    body: |
      You engaged his questions but leaned on bans or left a myth standing. Replay and reframe each around one realistic, local swap — and remember the referral boundary.
    debrief:
      objectivesMet:
        - 1
      keyPoints:
        - Gave reasonable answers but leaned on bans ('stop eating rice', 'don't eat eggs') instead of a quality-and-portion message, or left one or more myths (coconut oil/butter, protein powder) unaddressed.
        - Missed that his keenness for a strict low-carb plan on top of borderline glucose and cholesterol warrants a dietitian referral, or advised before hearing what he actually eats.
