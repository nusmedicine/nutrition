<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img"
     aria-labelledby="fa-title fa-desc" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="fa-title">How dietary fat is absorbed</title>
  <desc id="fa-desc">A fat droplet is emulsified by bile salts, digested by lipase to fatty acids and
    monoglycerides, ferried to the gut wall inside mixed micelles, absorbed into the enterocyte where it is
    re-esterified to triglyceride and packaged into a chylomicron, which then enters the lacteal (lymph). Short- and
    medium-chain fatty acids instead enter the blood directly.</desc>

  <style>
    .zone { font-size:13px; font-weight:700; fill:#5b6670; letter-spacing:.02em; }
    .lbl  { font-size:12.5px; fill:#1a2027; }
    .sub  { font-size:11px; fill:#5b6670; }
    .num  { font-size:12px; font-weight:700; fill:#fff; }
    .step { fill:#08503f; }
    .arrow { stroke:#8a93a0; stroke-width:2; fill:none; marker-end:url(#ah); }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#8a93a0"/>
    </marker>
  </defs>

  <!-- zone backgrounds -->
  <rect x="0" y="0" width="720" height="150" fill="#fbf3e6"/>
  <rect x="0" y="150" width="720" height="150" fill="#eef5f2"/>
  <rect x="0" y="300" width="720" height="80" fill="#f4f6f8"/>
  <text class="zone" x="14" y="22">GUT LUMEN</text>
  <text class="zone" x="14" y="172" fill="#0d5e3f">ENTEROCYTE (gut-lining cell)</text>
  <text class="zone" x="14" y="322">BLOOD &amp; LYMPH</text>

  <!-- brush border (apical) villi along the top of the cell -->
  <path d="M60 150 q6 -12 12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0 t12 0"
        fill="none" stroke="#0d5e3f" stroke-width="1.5" opacity=".55"/>

  <!-- STEP 1: fat droplet -->
  <circle cx="70" cy="86" r="26" fill="#f4c542" stroke="#d0a028" stroke-width="2"/>
  <circle class="step" cx="70" cy="52" r="10"/><text class="num" x="70" y="56" text-anchor="middle">1</text>
  <text class="lbl" x="70" y="128" text-anchor="middle">Fat droplet</text>
  <text class="sub" x="70" y="142" text-anchor="middle">(triglycerides)</text>

  <!-- STEP 2: bile emulsifies into smaller droplets -->
  <g>
    <circle cx="188" cy="72" r="11" fill="#f4c542" stroke="#d0a028" stroke-width="1.5"/>
    <circle cx="214" cy="92" r="9" fill="#f4c542" stroke="#d0a028" stroke-width="1.5"/>
    <circle cx="182" cy="98" r="8" fill="#f4c542" stroke="#d0a028" stroke-width="1.5"/>
    <!-- bile salts as little teal wedges on the surfaces -->
    <circle cx="200" cy="60" r="3.5" fill="#1f9d6b"/><circle cx="176" cy="84" r="3.5" fill="#1f9d6b"/>
    <circle cx="228" cy="86" r="3.5" fill="#1f9d6b"/><circle cx="196" cy="108" r="3.5" fill="#1f9d6b"/>
  </g>
  <circle class="step" cx="200" cy="40" r="10"/><text class="num" x="200" y="44" text-anchor="middle">2</text>
  <text class="lbl" x="200" y="128" text-anchor="middle">Bile salts emulsify</text>
  <text class="sub" x="200" y="142" text-anchor="middle">big drop → many small drops</text>

  <!-- STEP 3: lipase → FFA + monoglyceride; mixed micelle -->
  <circle cx="360" cy="84" r="20" fill="#cfeee0" stroke="#1f9d6b" stroke-width="2"/>
  <g stroke="#1f9d6b" stroke-width="2" fill="none">
    <path d="M352 78 l-6 -6 M368 78 l6 -6 M360 96 l0 8"/>
  </g>
  <circle class="step" cx="360" cy="50" r="10"/><text class="num" x="360" y="54" text-anchor="middle">3</text>
  <text class="lbl" x="360" y="128" text-anchor="middle">Lipase digests → micelle</text>
  <text class="sub" x="360" y="142" text-anchor="middle">fatty acids + monoglycerides</text>

  <!-- arrows across the lumen -->
  <path class="arrow" d="M104 86 L156 82"/>
  <path class="arrow" d="M240 84 L330 84"/>

  <!-- STEP 4: micelle docks & fats diffuse into the cell -->
  <circle class="step" cx="440" cy="120" r="10"/><text class="num" x="440" y="124" text-anchor="middle">4</text>
  <path class="arrow" d="M384 96 C 410 120 424 132 436 150"/>
  <text class="sub" x="486" y="140" text-anchor="middle">fats diffuse in;</text>
  <text class="sub" x="486" y="153" text-anchor="middle">micelle stays behind (a shuttle)</text>

  <!-- STEP 5: re-esterified inside the cell -->
  <circle cx="470" cy="212" r="16" fill="#f4c542" stroke="#d0a028" stroke-width="2"/>
  <circle class="step" cx="470" cy="186" r="10"/><text class="num" x="470" y="190" text-anchor="middle">5</text>
  <text class="lbl" x="470" y="250" text-anchor="middle">Re-esterified</text>
  <text class="sub" x="470" y="264" text-anchor="middle">back to triglyceride</text>

  <!-- STEP 6: packaged into a chylomicron -->
  <g>
    <circle cx="600" cy="208" r="30" fill="#f7d873" stroke="#c79a1e" stroke-width="2"/>
    <circle cx="590" cy="200" r="5" fill="#fff" opacity=".8"/><circle cx="610" cy="212" r="5" fill="#fff" opacity=".8"/>
    <circle cx="600" cy="222" r="4" fill="#fff" opacity=".8"/><circle cx="612" cy="196" r="4" fill="#fff" opacity=".8"/>
    <!-- coat proteins as small blue dots -->
    <circle cx="576" cy="208" r="4" fill="#1664c0"/><circle cx="624" cy="204" r="4" fill="#1664c0"/><circle cx="600" cy="180" r="4" fill="#1664c0"/>
  </g>
  <circle class="step" cx="600" cy="160" r="10"/><text class="num" x="600" y="164" text-anchor="middle">6</text>
  <text class="lbl" x="600" y="256" text-anchor="middle">Chylomicron</text>
  <text class="sub" x="600" y="270" text-anchor="middle">fat + cholesterol + protein coat</text>
  <path class="arrow" d="M488 212 L562 210"/>

  <!-- chylomicron too big for blood → into the lacteal (lymph) -->
  <rect x="470" y="316" width="250" height="20" rx="10" fill="#cdeede" stroke="#1f9d6b" stroke-width="2"/>
  <text class="lbl" x="486" y="356" fill="#0d5e3f">Lacteal → lymph → bloodstream</text>
  <path class="arrow" d="M600 240 L600 312"/>
  <text class="sub" x="628" y="300" text-anchor="start">too big for</text>
  <text class="sub" x="628" y="312" text-anchor="start">blood capillary</text>

  <!-- short/medium-chain aside: straight to blood -->
  <rect x="60" y="316" width="230" height="20" rx="10" fill="#f6dede" stroke="#c0392b" stroke-width="2"/>
  <text class="lbl" x="76" y="356" fill="#9b1c1c">Blood capillary → portal vein → liver</text>
  <path class="arrow" d="M150 240 C 150 280 150 296 150 312"/>
  <text class="sub" x="168" y="286" text-anchor="start">short- &amp; medium-chain</text>
  <text class="sub" x="168" y="299" text-anchor="start">fatty acids go straight to blood</text>
</svg>
