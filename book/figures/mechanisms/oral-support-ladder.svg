<svg viewBox="0 0 560 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ol-title ol-desc" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <title id="ol-title">Oral nutrition support is a ladder</title>
  <desc id="ol-desc">Oral nutrition support is a stepwise ladder. Start at the bottom with food-first: fix the cause of poor intake and optimise ordinary food. Next, food fortification: more energy and protein per mouthful without more volume. Next, oral nutritional supplements as an evidence-based add-on when food measures fall short. Above a dividing line are the specialist, dietitian-led rungs: enteral tube feeding, then parenteral intravenous feeding. The generalist screens, starts food-first and fortification, and refers; the plan itself is dietitian-led.</desc>
  <defs>
    <marker id="ol-ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    .rung { stroke-width:1.4; }
    .g    { fill:#eef5f2; stroke:#0b5b54; }
    .s    { fill:#eef1f4; stroke:#7c8794; }
    .step { fill:#0b5b54; font-size:14px; font-weight:600; }
    .sstep{ fill:#5b6670; font-size:14px; font-weight:600; }
    .sub  { fill:#5b6b7b; font-size:11px; }
    .num  { fill:#ffffff; font-size:13px; font-weight:700; }
    .numg { fill:#0b5b54; }
    .nums { fill:#7c8794; }
    .div  { stroke:#b0471d; stroke-width:1.6; stroke-dasharray:6 4; }
    .divlbl { fill:#7c2d12; font-size:11.5px; font-weight:600; }
    .hdr  { fill:#28425e; font-size:13px; font-weight:600; }
    .note { fill:#5b6b7b; font-size:11px; }
  </style>

  <text class="hdr" x="20" y="26">Start at the bottom — escalate only if the rung below is not enough</text>

  <!-- specialist zone (top) -->
  <rect class="rung s" x="150" y="46"  width="390" height="46" rx="8"/>
  <circle cx="128" cy="69" r="13" fill="#eef1f4" stroke="#7c8794"/>
  <text class="num nums" x="128" y="74" text-anchor="middle">5</text>
  <text class="sstep" x="166" y="66">Parenteral feeding (IV)</text>
  <text class="sub"   x="166" y="82">specialist</text>

  <rect class="rung s" x="150" y="100" width="390" height="46" rx="8"/>
  <circle cx="128" cy="123" r="13" fill="#eef1f4" stroke="#7c8794"/>
  <text class="num nums" x="128" y="128" text-anchor="middle">4</text>
  <text class="sstep" x="166" y="120">Enteral feeding (tube)</text>
  <text class="sub"   x="166" y="136">specialist</text>

  <!-- divider -->
  <line class="div" x1="40" y1="162" x2="540" y2="162"/>
  <text class="divlbl" x="40" y="177">↑ specialist, dietitian-led — refer above this line</text>

  <!-- generalist zone (bottom) -->
  <rect class="rung g" x="150" y="188" width="390" height="46" rx="8"/>
  <circle cx="128" cy="211" r="13" fill="#eef5f2" stroke="#0b5b54"/>
  <text class="num numg" x="128" y="216" text-anchor="middle">3</text>
  <text class="step" x="166" y="208">Oral nutritional supplements (ONS)</text>
  <text class="sub"  x="166" y="224">evidence-based add-on — not the opening move</text>

  <rect class="rung g" x="150" y="242" width="390" height="46" rx="8"/>
  <circle cx="128" cy="265" r="13" fill="#eef5f2" stroke="#0b5b54"/>
  <text class="num numg" x="128" y="270" text-anchor="middle">2</text>
  <text class="step" x="166" y="262">Food fortification</text>
  <text class="sub"  x="166" y="278">more energy &amp; protein per mouthful, no extra volume</text>

  <rect class="rung g" x="150" y="296" width="390" height="46" rx="8"/>
  <circle cx="128" cy="319" r="13" fill="#eef5f2" stroke="#0b5b54"/>
  <text class="num numg" x="128" y="324" text-anchor="middle">1</text>
  <text class="step" x="166" y="316">Food-first</text>
  <text class="sub"  x="166" y="332">fix the cause of poor intake, optimise ordinary food</text>

  <!-- escalate arrow -->
  <line x1="70" y1="330" x2="70" y2="70" stroke="#64748b" stroke-width="2" fill="none" marker-end="url(#ol-ah)"/>
  <text class="note" x="58" y="360" transform="rotate(-90 58 360)">escalate</text>

  <!-- generalist bracket -->
  <text class="note" x="150" y="356"><tspan x="150" dy="0">The generalist starts at rungs 1–2 and reviews ONS</tspan><tspan x="150" dy="15">with the dietitian; refer for the rungs above.</tspan></text>
</svg>
