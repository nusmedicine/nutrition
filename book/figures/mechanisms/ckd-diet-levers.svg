<svg viewBox="0 0 780 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ck-title ck-desc" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <title id="ck-title">Why a failing kidney rewrites the diet</title>
  <desc id="ck-desc">In health the kidney clears sodium, potassium, phosphate, acid and water and activates vitamin D, so the diet need not manage them. As nephrons are lost in chronic kidney disease, these substances accumulate in the blood: retained sodium and water raise blood pressure and cause oedema, potassium rises toward dangerous hyperkalaemia, retained phosphate with reduced vitamin D drives bone and vessel disease, and acid builds up. So five dietary levers — sodium, potassium, phosphate, fluid and protein — must now do some of the work the kidney no longer can, delivered as an individualised, dietitian-led renal diet.</desc>
  <defs>
    <marker id="ck-ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <style>
    .box  { fill:#eef5f2; stroke:#0b5b54; stroke-width:1.4; }
    .lbl  { fill:#17324d; font-size:13px; }
    .hdr  { fill:#0b5b54; font-size:13px; font-weight:600; }
    .out  { fill:#fdecec; stroke:#c2410c; stroke-width:1.4; }
    .ohdr { fill:#7c2d12; font-size:13px; font-weight:600; }
    .olbl { fill:#7c2d12; font-size:12.5px; }
    .chip { fill:#f3f6f9; stroke:#47607a; stroke-width:1.3; }
    .clbl { fill:#28425e; font-size:13px; font-weight:600; }
    .ctag { fill:#5b6b7b; font-size:10px; }
    .hub  { fill:#0f766e; stroke:#0b5b54; stroke-width:1.5; }
    .hlbl { fill:#ffffff; font-size:13.5px; font-weight:600; }
    .flow { stroke:#64748b; stroke-width:2; fill:none; }
    .band { fill:#28425e; font-size:12.5px; font-weight:600; }
    .note { fill:#5b6b7b; font-size:11px; }
  </style>

  <text class="hdr" x="175" y="24" text-anchor="middle">In health</text>
  <text class="ohdr" x="595" y="24" text-anchor="middle">In chronic kidney disease</text>

  <!-- healthy kidney panel -->
  <rect class="box" x="35" y="36" width="280" height="140" rx="9"/>
  <text class="hdr" x="175" y="60" text-anchor="middle">The kidney clears &amp; regulates</text>
  <text class="lbl" x="175" y="84" text-anchor="middle">sodium · potassium · phosphate</text>
  <text class="lbl" x="175" y="104" text-anchor="middle">acid · water</text>
  <text class="lbl" x="175" y="124" text-anchor="middle">and activates vitamin D</text>
  <text class="note" x="175" y="152" text-anchor="middle">so the diet need not manage these</text>

  <!-- transition arrow -->
  <line class="flow" x1="315" y1="106" x2="440" y2="106" marker-end="url(#ck-ah)"/>
  <text class="note" x="377" y="98" text-anchor="middle">nephron loss</text>

  <!-- CKD panel: accumulation -->
  <rect class="out" x="440" y="36" width="305" height="140" rx="9"/>
  <text class="ohdr" x="592" y="58" text-anchor="middle">Things accumulate in the blood</text>
  <text class="olbl" x="592" y="80" text-anchor="middle">↑ sodium &amp; water → ↑ BP, oedema</text>
  <text class="olbl" x="592" y="100" text-anchor="middle">↑ potassium → hyperkalaemia</text>
  <text class="olbl" x="592" y="120" text-anchor="middle">↑ phosphate + ↓ vitamin D → bone disease</text>
  <text class="olbl" x="592" y="140" text-anchor="middle">↑ acid &amp; urea (protein waste)</text>
  <text class="note" x="592" y="164" text-anchor="middle">the kidney can no longer keep balance</text>

  <!-- connective band -->
  <line class="flow" x1="592" y1="176" x2="592" y2="204" marker-end="url(#ck-ah)"/>
  <text class="band" x="390" y="224" text-anchor="middle">So five dietary levers must now do some of the kidney's work</text>

  <!-- five lever chips -->
  <!-- centers: 86, 238, 390, 542, 694 -->
  <g>
    <rect class="chip" x="20"  y="240" width="132" height="56" rx="8"/>
    <text class="clbl" x="86"  y="266" text-anchor="middle">Sodium</text>
    <text class="ctag" x="86"  y="284" text-anchor="middle">reinforce ✓</text>

    <rect class="chip" x="172" y="240" width="132" height="56" rx="8"/>
    <text class="clbl" x="238" y="266" text-anchor="middle">Potassium</text>
    <text class="ctag" x="238" y="284" text-anchor="middle">hyperkalaemia risk</text>

    <rect class="chip" x="324" y="240" width="132" height="56" rx="8"/>
    <text class="clbl" x="390" y="266" text-anchor="middle">Phosphate</text>
    <text class="ctag" x="390" y="284" text-anchor="middle">hidden additives</text>

    <rect class="chip" x="476" y="240" width="132" height="56" rx="8"/>
    <text class="clbl" x="542" y="266" text-anchor="middle">Fluid</text>
    <text class="ctag" x="542" y="284" text-anchor="middle">if overload</text>

    <rect class="chip" x="628" y="240" width="132" height="56" rx="8"/>
    <text class="clbl" x="694" y="266" text-anchor="middle">Protein</text>
    <text class="ctag" x="694" y="284" text-anchor="middle">enough, not too little</text>
  </g>

  <!-- converge to hub -->
  <line class="flow" x1="86"  y1="296" x2="360" y2="392" marker-end="url(#ck-ah)"/>
  <line class="flow" x1="238" y1="296" x2="360" y2="392"/>
  <line class="flow" x1="390" y1="296" x2="390" y2="392" marker-end="url(#ck-ah)"/>
  <line class="flow" x1="542" y1="296" x2="420" y2="392"/>
  <line class="flow" x1="694" y1="296" x2="420" y2="392" marker-end="url(#ck-ah)"/>

  <!-- refer hub -->
  <rect class="hub" x="185" y="394" width="410" height="56" rx="10"/>
  <text class="hlbl" x="390" y="418" text-anchor="middle">Individualised, dietitian-led renal diet</text>
  <text class="hlbl" x="390" y="438" text-anchor="middle">recognise the levers · refer</text>
</svg>
