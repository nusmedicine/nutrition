<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cb-title cb-desc" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <title id="cb-title">Calcium bioavailability by source — content is not availability</title>
  <desc id="cb-desc">A bar chart of the fraction of calcium absorbed by food source. Calcium in high-oxalate spinach is only about 5 percent absorbed. Milk and calcium-set tofu are absorbed comparably, around a quarter to a third. Low-oxalate greens such as kai-lan and bok choy are absorbed better still, around a half. The amount of calcium a food contains is not the same as how much is delivered to bone; the spinach that looks calcium-rich on a label is nearly useless for bone.</desc>
  <style>
    .hd   { fill:#17324d; font-size:15px; font-weight:600; }
    .cat  { fill:#28425e; font-size:12.5px; font-weight:600; }
    .sub  { fill:#5b6b7b; font-size:10.5px; }
    .val  { font-size:13px; font-weight:700; }
    .axis { stroke:#9aa7b4; stroke-width:1; }
    .tick { fill:#5b6b7b; font-size:11px; }
    .note { fill:#7c2d12; font-size:11px; font-weight:600; }
  </style>

  <text class="hd" x="20" y="26">Fraction of calcium absorbed, by source</text>

  <!-- axis: 0 at x=210, 60% at x=650; 1% = 7.33px; tick at 30% -> x=430 -->
  <line class="axis" x1="210" y1="48" x2="210" y2="256"/>
  <line class="axis" x1="210" y1="256" x2="650" y2="256"/>
  <line class="axis" x1="430" y1="48" x2="430" y2="256" stroke-dasharray="3 4"/>
  <text class="tick" x="210" y="274" text-anchor="middle">0%</text>
  <text class="tick" x="430" y="274" text-anchor="middle">30%</text>
  <text class="tick" x="650" y="274" text-anchor="middle">60%</text>

  <!-- Spinach ~5% -> 37px -->
  <text class="cat" x="196" y="70"  text-anchor="end">Spinach</text>
  <text class="sub" x="196" y="85"  text-anchor="end">(high-oxalate)</text>
  <rect x="210" y="56" width="37" height="34" rx="4" fill="#c2410c"/>
  <text class="val" x="255" y="79" fill="#8a2c0c">≈5%</text>

  <!-- Milk ~30% -> 220px -->
  <text class="cat" x="196" y="128" text-anchor="end">Milk</text>
  <rect x="210" y="110" width="220" height="34" rx="4" fill="#5b7a99"/>
  <text class="val" x="440" y="133" fill="#3d566e">≈30%</text>

  <!-- Calcium-set tofu ~30% -> 220px -->
  <text class="cat" x="196" y="182" text-anchor="end">Calcium-set tofu</text>
  <text class="sub" x="196" y="197" text-anchor="end">(absorbs like milk)</text>
  <rect x="210" y="164" width="220" height="34" rx="4" fill="#2f9e70"/>
  <text class="val" x="440" y="187" fill="#1c6647">≈30%</text>

  <!-- Low-oxalate greens ~50% -> 367px -->
  <text class="cat" x="196" y="236" text-anchor="end">Low-oxalate greens</text>
  <text class="sub" x="196" y="251" text-anchor="end">(kai-lan, bok choy)</text>
  <rect x="210" y="218" width="367" height="34" rx="4" fill="#2f9e70"/>
  <text class="val" x="587" y="241" fill="#1c6647">≈50%</text>

  <text class="note" x="20" y="300">Content is not availability — oxalate locks spinach's calcium away.</text>
</svg>
