id: dietary-fats
title: "The shape of dietary fats"
intro: >
  See the shape behind fat quality. Start with the 2D formula, then rotate the 3D model.
  A cis double bond bends the chain; a trans bond — and a fully saturated chain — stay
  straight, so they pack tightly like solid fats.
molecules:
  - id: oleic
    name: "Oleic acid (cis-unsaturated)"
    sdf: /structures/oleic-acid.sdf
    svg: /structures/oleic-acid.svg
    note: >
      One cis double bond at carbon 9 kinks the chain — the hallmark of most healthy
      unsaturated fats (the main fat in olive oil). The bend stops the molecules packing
      tightly, so these fats are liquid at room temperature.
  - id: elaidic
    name: "Elaidic acid (trans-unsaturated)"
    sdf: /structures/elaidic-acid.sdf
    svg: /structures/elaidic-acid.svg
    note: >
      Same atoms as oleic acid, but the trans double bond leaves the chain almost
      straight — so it packs tightly and behaves like a saturated fat. This is the
      industrial trans fat with the clearest dietary harm signal.
  - id: stearic
    name: "Stearic acid (saturated)"
    sdf: /structures/stearic-acid.sdf
    svg: /structures/stearic-acid.svg
    note: >
      No double bonds at all — a fully saturated, straight chain that packs tightly and is
      solid at room temperature (common in animal fats). Notice how similar its straight
      shape is to the trans fat: that is why trans fats behave like saturated ones.
