id: dietary-fats
title: "The shape of dietary fats"
intro: >
  Rotate each molecule and switch the view. Watch what the double bond does to the
  chain: the cis bond in oleic acid bends it, while the trans bond in elaidic acid
  keeps it straight — the same geometry that makes trans fats behave like saturated fats.
molecules:
  - id: oleic
    name: "Oleic acid (cis-unsaturated)"
    sdf: /structures/oleic-acid.sdf
    note: >
      A single cis double bond at carbon 9 puts a kink in the chain — the hallmark of
      most healthy unsaturated fats (it is the main fat in olive oil). The bend stops the
      molecules packing tightly, so these fats are liquid at room temperature.
  - id: elaidic
    name: "Elaidic acid (trans-unsaturated)"
    sdf: /structures/elaidic-acid.sdf
    note: >
      Same atoms as oleic acid, but the trans double bond leaves the chain almost
      straight — so it packs tightly and behaves like a saturated fat. This is the
      industrial trans fat with the clearest dietary harm signal.
  - id: glucose
    name: "Glucose (ring form)"
    sdf: /structures/glucose.sdf
    note: >
      The body's primary fuel sugar, shown here as its six-membered ring. Compare its
      compact shape with the long fatty-acid chains.
