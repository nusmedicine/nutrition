id: protein-structure
title: "The shape of a protein"
intro: >
  A protein's job follows its folded shape. Rotate these real structures: myoglobin is a
  single folded chain — tertiary structure — while haemoglobin assembles four such chains into
  one molecule — quaternary structure. Colour by chain to pick out the subunits, or by
  structure to see the α-helices and β-sheets.
proteins:
  - id: myoglobin
    name: "Myoglobin — one chain (tertiary)"
    pdb: /structures/myoglobin-1mbn.pdb
    note: >
      A single chain of about 150 amino acids folded into a compact bundle of α-helices — the
      classic example of tertiary structure. The heme group (shown as sticks) is where oxygen
      binds. (PDB 1MBN.)
  - id: hemoglobin
    name: "Haemoglobin — four chains (quaternary)"
    pdb: /structures/hemoglobin-2hhb.pdb
    note: >
      Four myoglobin-like subunits — two α and two β — assembled into one molecule, the
      hallmark of quaternary structure. Each carries a heme; a single amino-acid change in the
      β-chain is what causes sickle-cell disease. (PDB 2HHB.)
