id: micronutrients-hydration
title: "Quick check: micronutrients, hydration & electrolytes"
questions:
  - id: q1
    stem: "Why can fat-soluble vitamins (A, D, E, K) cause toxicity more readily than water-soluble ones?"
    options:
      - text: "Because they are stored in the body rather than readily excreted"
        correct: true
        feedback: "Correct — fat-soluble vitamins accumulate, so megadoses can reach toxic levels; water-soluble excess is largely excreted."
      - text: "Because they contain more energy"
        correct: false
        feedback: "Vitamins supply negligible energy; storage, not energy content, explains the toxicity risk."
      - text: "Because the body cannot absorb them at all"
        correct: false
        feedback: "They are absorbed (with dietary fat) and then stored — which is exactly why excess can accumulate."

  - id: q2
    stem: "A man with chronic heavy alcohol use arrives confused, with an unsteady gait and abnormal eye movements. Which vitamin deficiency must be treated urgently?"
    options:
      - text: "Thiamine (vitamin B1)"
        correct: true
        feedback: "Correct — this is Wernicke's encephalopathy (confusion + ataxia + eye-movement problems); thiamine is given urgently in at-risk drinkers to prevent permanent damage."
      - text: "Vitamin C"
        correct: false
        feedback: "Vitamin C deficiency causes scurvy (bleeding gums, poor healing), not this acute neurological triad."
      - text: "Vitamin D"
        correct: false
        feedback: "Vitamin D deficiency affects bone (rickets/osteomalacia), not this acute confusional state."

  - id: q3
    stem: "Why is folic acid recommended *before* conception rather than once pregnancy is confirmed?"
    options:
      - text: "The neural tube closes about four weeks after conception — often before pregnancy is known"
        correct: true
        feedback: "Correct — by the time a pregnancy test is positive it is usually too late to prevent neural-tube defects such as spina bifida, so folate must be adequate periconceptionally."
      - text: "Folic acid is destroyed by pregnancy hormones"
        correct: false
        feedback: "No — the reason is timing: the neural tube has usually already closed by the time pregnancy is confirmed."
      - text: "Folate only works if taken together with iron"
        correct: false
        feedback: "No — the periconceptional timing is the key point, independent of iron."

  - id: q4
    stem: "An older adult living alone, eating mostly 'tea and toast', has bleeding, spongy gums, easy bruising and slow-healing wounds. Which deficiency fits best?"
    options:
      - text: "Vitamin C (scurvy)"
        correct: true
        feedback: "Correct — vitamin C is needed to build collagen, so deficiency shows as bleeding gums, easy bruising and poor wound healing; the restricted diet is the clue."
      - text: "Vitamin K"
        correct: false
        feedback: "Vitamin K deficiency also causes bleeding, but not the spongy-gums-plus-poor-healing (collagen) picture; the tea-and-toast diet points to vitamin C."
      - text: "Vitamin A"
        correct: false
        feedback: "Vitamin A deficiency causes night blindness and dry eyes, not this bleeding-gums picture."

  - id: q5
    stem: "Which group is at notably higher risk of vitamin B12 deficiency?"
    options:
      - text: "People on long-term metformin, strict vegans, and older adults"
        correct: true
        feedback: "Correct — all three are recognised at-risk groups. Note also that giving folate alone can mask the anaemia while B12 nerve damage silently progresses."
      - text: "Young men who eat plenty of red meat"
        correct: false
        feedback: "Regular animal-product intake makes B12 deficiency unlikely in this group."
      - text: "People who spend a lot of time outdoors"
        correct: false
        feedback: "Sun exposure relates to vitamin D, not B12."

  - id: q6
    stem: "A vegetarian patient wants to absorb more iron from a lentil (dhal) meal. What is the best first-year advice?"
    options:
      - text: "Add a vitamin-C-rich food, and keep tea/coffee for between meals"
        correct: true
        feedback: "Correct — vitamin C boosts absorption of plant (non-haem) iron, while the tannins in tea and coffee taken with a meal cut it substantially."
      - text: "Drink a cup of strong tea with the meal to aid digestion"
        correct: false
        feedback: "The opposite — tannins in tea markedly reduce non-haem iron absorption; keep tea between meals."
      - text: "Take a calcium supplement with the meal"
        correct: false
        feedback: "Calcium can inhibit iron absorption in the same meal — it won't help and may hinder."

  - id: q7
    stem: "A 24-year-old woman is tired, pale, and breathless climbing stairs, with heavy periods. Which deficiency fits best?"
    options:
      - text: "Iron-deficiency anaemia"
        correct: true
        feedback: "Correct — the classic pattern in a menstruating woman; heavy menstrual bleeding is a leading cause."
      - text: "Vitamin D deficiency"
        correct: false
        feedback: "Vitamin D deficiency doesn't classically cause this pallor-plus-breathlessness picture."
      - text: "Vitamin B12 from long-term metformin"
        correct: false
        feedback: "B12 deficiency is a real cause of anaemia, but the heavy-periods history points to iron first; she isn't described as on metformin."

  - id: q8
    stem: "Which of these is a *poor* source of absorbable calcium, despite being 'high in calcium'?"
    options:
      - text: "Spinach"
        correct: true
        feedback: "Correct — spinach's oxalate binds its calcium, so little is absorbed. Low-oxalate greens (kai-lan, bok choy) and calcium-set tofu are far better non-dairy sources."
      - text: "Calcium-set tofu"
        correct: false
        feedback: "Actually a good source — tofu set with a calcium coagulant is absorbed about as well as milk."
      - text: "Kai-lan (Chinese broccoli)"
        correct: false
        feedback: "A good source — low-oxalate greens provide well-absorbed calcium."

  - id: q9
    stem: "A health-conscious family switches entirely from iodised table salt to 'natural' sea salt and pink Himalayan salt. What is the hidden nutritional risk?"
    options:
      - text: "Most gourmet salts aren't iodised, risking iodine deficiency — which matters most in pregnancy"
        correct: true
        feedback: "Correct — iodised salt is a key iodine source; iodine builds thyroid hormone and is vital for fetal brain development, so losing it is riskiest in pregnancy."
      - text: "Sea salt contains dangerously high levels of iodine"
        correct: false
        feedback: "The opposite — most sea and gourmet salts contain little or no iodine."
      - text: "Gourmet salts have far more sodium, raising blood pressure"
        correct: false
        feedback: "Sodium content is essentially the same; the real difference is the missing iodine."

  - id: q10
    stem: "For blood pressure, how do sodium and potassium act?"
    options:
      - text: "High sodium raises BP; adequate potassium helps lower it"
        correct: true
        feedback: "Correct — they pull in opposite directions; WHO targets <2,000 mg sodium and ≥3,510 mg potassium per day."
      - text: "Both raise blood pressure equally"
        correct: false
        feedback: "Potassium tends to *lower* blood pressure — the opposite of sodium."
      - text: "Neither has any effect on blood pressure"
        correct: false
        feedback: "Both matter; the sodium–potassium balance is central to blood-pressure risk."

  - id: q11
    stem: "In the National Nutrition Survey 2022, where does most of Singaporeans' dietary sodium come from?"
    options:
      - text: "Sauces, broths and food eaten out — not mainly the table salt-shaker"
        correct: true
        feedback: "Correct — most sodium is already *in* prepared and hawker foods, which is why population strategies target the food supply."
      - text: "Mostly salt added at the dining table"
        correct: false
        feedback: "A common misconception — the bulk is in cooking sauces, broths and eating out."
      - text: "Mostly from fresh fruit"
        correct: false
        feedback: "Fruit is low in sodium and a good potassium source."

  - id: q12
    stem: "How should the SSaSS salt-substitute trial be summarised to a patient with kidney disease?"
    options:
      - text: "Potassium-based salt substitutes may be unsafe for them (hyperkalaemia risk) — not blanket advice"
        correct: true
        feedback: "Correct — SSaSS benefit was in a specific high-risk group, much of the BP effect came from added potassium, and substitutes are risky in CKD or on certain BP drugs."
      - text: "Everyone should switch to a potassium salt substitute immediately"
        correct: false
        feedback: "Unsafe to generalise — hyperkalaemia risk makes substitutes inappropriate in kidney disease and on some medications."
      - text: "The trial proves salt has no effect on health"
        correct: false
        feedback: "It showed real benefit; the nuance is about *who* it applies to and *which* electrolyte drove it."
