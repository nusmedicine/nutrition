id: life-cycle-nutrition
title: "Quick check: nutrition across the life cycle"
questions:
  - id: q1
    stem: "Which nutrient is most specifically tied to the **periconceptional** period (before and in early pregnancy), and why?"
    options:
      - text: "Folic acid — it reduces the risk of neural tube defects, which form in the first weeks before many pregnancies are even confirmed"
        correct: true
        feedback: "Correct — that's why folate is started *before* conception, ideally, not once pregnancy is discovered."
      - text: "Vitamin C — to boost the immune system"
        correct: false
        feedback: "Not the defining periconceptional nutrient. Folate, for neural tube defect prevention, is the key one with a critical early-timing window."
      - text: "Extra calories — you must eat for two from the start"
        correct: false
        feedback: "\"Eating for two\" is a myth — energy needs rise only modestly and mainly later. Folate is the timing-critical nutrient early on."

  - id: q2
    stem: "In Singapore, who is offered screening for gestational diabetes, and when?"
    options:
      - text: "Every pregnant woman, with a 75 g glucose tolerance test at 24–28 weeks (universal screening)"
        correct: true
        feedback: "Correct — Singapore screens universally because local evidence (GUSTO) showed risk-based screening would have missed about half of GDM cases in Asian women."
      - text: "Only women who are older, overweight, or have a family history of diabetes"
        correct: false
        feedback: "That's risk-based screening — which the GUSTO cohort showed would have missed roughly half of local cases. Singapore screens everyone."
      - text: "Only women who develop symptoms of high blood sugar"
        correct: false
        feedback: "GDM is usually asymptomatic — that's exactly why routine universal screening at 24–28 weeks is used."

  - id: q3
    stem: "How do protein needs change in healthy older adults?"
    options:
      - text: "They rise — to about 1.0–1.2 g/kg/day — to help defend muscle against sarcopenia and frailty"
        correct: true
        feedback: "Correct, and counter-intuitive: energy needs fall with age but protein needs per kg go *up* (above the ~0.8 g/kg of a younger adult)."
      - text: "They fall, because older people are less active"
        correct: false
        feedback: "A common error — energy needs fall, but protein needs per kg rise to protect muscle. Under-eating protein drives frailty."
      - text: "They stay exactly the same as in young adulthood"
        correct: false
        feedback: "Needs rise: ~1.0–1.2 g/kg/day for healthy older adults, versus ~0.8 for younger adults."

  - id: q4
    stem: "A pregnant woman asks if she now needs to \"eat for two.\" What's the accurate answer?"
    options:
      - text: "No — energy needs rise only modestly, mainly in the later trimesters; the quality of a few key nutrients matters far more than eating double"
        correct: true
        feedback: "Correct — it's roughly one extra small meal a day later on, not a doubling. Folate, iron and iodine matter far more than sheer quantity."
      - text: "Yes — she should double her food intake to support the baby"
        correct: false
        feedback: "This is the myth. Doubling intake mainly adds excess weight; energy needs rise only modestly."
      - text: "No — in fact she should eat less to avoid gestational diabetes"
        correct: false
        feedback: "Under-eating isn't the goal either — adequate intake of quality foods is. GDM is managed with food *quality* and screening, not by eating less overall."

  - id: q5
    stem: "What is the standard recommendation for feeding a healthy newborn in the first months?"
    options:
      - text: "Exclusive breastfeeding for about the first 6 months (no water or other foods), then iron-rich complementary foods from around 6 months"
        correct: true
        feedback: "Correct — with the honest caveat that the exact window is debated (allergy/iron considerations may favour introducing some solids in the 4–6 month range)."
      - text: "Formula plus water from birth, with solids at 2 months"
        correct: false
        feedback: "Solids at 2 months is far too early (not before 4 months), and exclusive breastfeeding is recommended where possible."
      - text: "Breast milk plus water until 12 months, no solids"
        correct: false
        feedback: "\"Exclusive\" means no water either, and complementary foods should start around 6 months — not be delayed to 12."

  - id: q6
    stem: "Why is **adolescence** an especially demanding stage for calcium and iron?"
    options:
      - text: "It's the peak bone-building window (highest lifetime calcium need), and menstruating girls lose iron each cycle on top of growth demands"
        correct: true
        feedback: "Correct — most peak bone mass is laid down by the late teens, and menstrual iron loss makes adolescent girls a classic deficiency group."
      - text: "Teenagers stop growing, so their needs drop below a child's"
        correct: false
        feedback: "The opposite — the growth spurt and bone accrual push several needs to their lifetime highest."
      - text: "Only because teenagers eat a lot of fast food"
        correct: false
        feedback: "Diet quality matters, but the underlying reason is physiological: peak bone accrual plus (for girls) menstrual iron loss."

  - id: q7
    stem: "An 80-year-old is losing weight without trying and eating less since her husband died. What does this most likely represent?"
    options:
      - text: "A shift from a normal life-stage need into possible undernutrition — recognise the red flags (unintentional weight loss, eating alone) and refer"
        correct: true
        feedback: "Correct — unintentional weight loss and social isolation are warning signs. This has tipped from 'shifting needs in health' into a clinical problem to screen and refer (the Undernutrition & Malnutrition chapter)."
      - text: "Healthy ageing — older people are supposed to eat less and lose weight"
        correct: false
        feedback: "Unintentional weight loss in an older adult is a red flag, not normal ageing. Eating alone after bereavement is a modifiable driver."
      - text: "Nothing to act on unless her BMI is already low"
        correct: false
        feedback: "Recent unintentional weight loss and reduced intake are red flags regardless of current BMI — how screening tools weigh them is the Undernutrition & Malnutrition chapter's territory."
