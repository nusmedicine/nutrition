id: cardiovascular-disease-hypertension
title: "Quick check: cardiovascular disease & hypertension"
questions:
  - id: q1
    stem: "Two dietary patterns are often confused. Which pairing correctly matches each pattern to the **primary evidence** it rests on?"
    options:
      - text: "DASH → lower blood pressure (feeding trial); Mediterranean → events (PREDIMED)"
        correct: true
        feedback: "Correct. DASH was designed as a blood-pressure pattern and proved it in a controlled feeding trial with a surrogate BP endpoint; the Mediterranean pattern has cardiovascular event-level evidence from PREDIMED, where a composite of events fell about 30% in relative terms. Matching each pattern to its own endpoint keeps you from over-claiming."
      - text: "DASH → fewer cardiovascular events (PREDIMED); Mediterranean → lower blood pressure"
        correct: false
        feedback: "This reverses the two. PREDIMED tested the Mediterranean pattern on events, while DASH is the blood-pressure pattern proven in a feeding trial."
      - text: "Both patterns rest mainly on hard-outcome trials showing fewer heart attacks"
        correct: false
        feedback: "DASH's landmark evidence is a short feeding trial with a blood-pressure (surrogate) endpoint, not hard outcomes. Only the Mediterranean pattern has the event-level PREDIMED signal, and even that was stroke-driven."
      - text: "Both patterns rest mainly on feeding trials using blood pressure as the endpoint"
        correct: false
        feedback: "DASH used a blood-pressure endpoint, but the Mediterranean evidence from PREDIMED measured cardiovascular events, not blood pressure. The two endpoints are different."

  - id: q2
    stem: "A patient wants to make their diet more heart-healthy and asks about fat. Which change is best supported for lowering **cardiovascular risk**?"
    options:
      - text: "Replacing saturated and trans fat with unsaturated oils"
        correct: true
        feedback: "Correct. It is fat quality and replacement, not fat quantity — swapping saturated and trans fat for unsaturated fat lowers LDL cholesterol and cuts events (around 17% fewer, and a statin-sized ~30% when saturated fat is specifically replaced with polyunsaturated fat). Always ask 'replaced with what?'"
      - text: "Cutting fat across the board and eating more refined carbohydrate and sugar"
        correct: false
        feedback: "This is the swap that does not help. When saturated fat is replaced with refined carbohydrate and sugar there is no benefit — which is why 'just eat less fat' misses the point."
      - text: "Keeping fat the same but eating smaller total portions at every meal"
        correct: false
        feedback: "Portion size is not the lever here. The evidence is about the type of fat and what it is replaced with, not simply eating less of everything."
      - text: "Switching from unsaturated oils back to butter and palm oil for cooking"
        correct: false
        feedback: "This goes the wrong way. Unsaturated oils are the ones to favour; moving toward butter and palm oil raises saturated fat and LDL cholesterol."

  - id: q3
    stem: "A colleague says, \"PREDIMED was **retracted**, so the Mediterranean diet is debunked.\" What is the accurate response?"
    options:
      - text: "It was retracted then republished in 2018, with the conclusion upheld"
        correct: true
        feedback: "Correct. The 2013 paper was retracted over randomisation irregularities, re-analysed, and republished in 2018 with the finding standing — science self-correcting, not a diet debunked. The benefit was a relative reduction on a composite endpoint, driven mainly by stroke, in a high-risk Spanish group."
      - text: "It was retracted for good, so the Mediterranean pattern has no trial evidence at all"
        correct: false
        feedback: "The paper was republished after re-analysis, and its conclusion held. The Mediterranean pattern does have event-level trial evidence, so treating it as fully discredited is wrong."
      - text: "The retraction proved the diet caused harm, reversing the original benefit"
        correct: false
        feedback: "The retraction concerned how participants were randomised, not a reversal to harm. On re-analysis the benefit remained, so nothing suggests the pattern was harmful."
      - text: "Nothing changed, since the finding was a large absolute cut in heart attacks for everyone"
        correct: false
        feedback: "The benefit was a relative reduction on a composite endpoint in a high-risk group, driven by stroke, not a large absolute cut in heart attacks for everyone. That nuance is exactly what to keep in mind."

  - id: q4
    stem: "A patient in Singapore eats out most days and wants to cut sodium. Where is most of the salt, and what is the best first swap?"
    options:
      - text: "Mostly in soups, gravies and sauces — so leave most of the soup"
        correct: true
        feedback: "Correct. Locally, most sodium is hidden in soup bases, gravies, sauces and food eaten out — not the salt shaker — and a bowl of fishball noodle soup can carry most of a day's sodium. Leaving most of the soup (and taking sauce on the side) targets the real source."
      - text: "Mostly in the salt shaker — so just stop adding table salt at the table"
        correct: false
        feedback: "The shaker is a small part of the problem. Most sodium is already in the soups, gravies and sauces before the food reaches the table, so skipping the shaker alone changes little."
      - text: "Mostly in fresh vegetables and fruit — so eat fewer of those with meals"
        correct: false
        feedback: "Vegetables and fruit are low in sodium and are the potassium counterpart you want more of. Cutting them is the opposite of the right move."
      - text: "Mostly in plain rice and noodles — so remove all starch from the plate"
        correct: false
        feedback: "Plain rice and noodles are not the main sodium source; the salt is in the accompanying soup, gravy and sauces. Removing starch does not address where the sodium actually sits."

  - id: q5
    stem: "A patient asks whether to buy **fish-oil capsules** \"for the heart.\" What is the best answer?"
    options:
      - text: "Recommend eating oily fish; routine omega-3 capsules have not prevented events"
        correct: true
        feedback: "Correct. Oily fish is a food to recommend as part of the pattern, but routine omega-3 supplements failed to prevent cardiovascular events in large trials (VITAL, ASCEND). The high-dose 'fish-oil trial' people cite tested icosapent ethyl — a prescription drug and a specialist decision — which you cannot extrapolate to over-the-counter fish oil."
      - text: "Recommend the capsules, since a large drug trial proved fish oil prevents events"
        correct: false
        feedback: "That trial tested icosapent ethyl, a high-dose prescription drug in selected patients — not over-the-counter fish oil. Routine omega-3 supplements did not prevent events, so you cannot extrapolate the drug result to capsules."
      - text: "Tell the patient neither fish nor capsules matter for heart health"
        correct: false
        feedback: "Oily fish is a recommended food and part of the heart-healthy pattern. The nuance is capsule versus food versus drug, not that fish is irrelevant."
      - text: "Recommend the capsules over fish, as they deliver the same benefit more reliably"
        correct: false
        feedback: "The evidence points the other way: recommend the fish, not the capsule. Routine omega-3 supplements did not reproduce a benefit in prevention trials."

  - id: q6
    stem: "A patient's LDL cholesterol comes back raised. At this stage, what should you do with that **number**?"
    options:
      - text: "Look up the risk-tiered guidance and refer, not recite a threshold"
        correct: true
        feedback: "Correct. Targets are risk-tiered and looked up, not memorised: a clinician estimates cardiovascular risk (in Singapore, with SG-FRS-2023) and the ACE guidance generates the individual's target. The job here is to deliver the lifestyle levers and refer, recognising the target exists and is individualised."
      - text: "Recite the single LDL threshold that applies to every adult patient"
        correct: false
        feedback: "There is no single number to recite. Targets are individualised by cardiovascular risk and looked up in the guidance, so memorising one threshold would be applying it wrongly."
      - text: "Start a cholesterol-lowering drug immediately at a fixed standard dose"
        correct: false
        feedback: "Starting a drug is a clinician's risk-tiered decision, not a reflex from one number. The move here is lifestyle-first and refer, with drug thresholds signposted rather than applied from memory."
      - text: "Reassure the patient that a raised number rarely needs any follow-up"
        correct: false
        feedback: "A raised LDL is exactly what should prompt risk estimation and referral. The right response is to look up the risk-tiered guidance and refer, not to dismiss it."

  - id: q7
    stem: "Singapore uses **SG-FRS-2023** rather than an imported US risk score. Why, and what does it actually estimate?"
    options:
      - text: "It is recalibrated on local multi-ethnic data and estimates 10-year coronary risk"
        correct: true
        feedback: "Correct. Imported US equations mis-estimate risk across Chinese, Malay and Indian groups, so the score was recalibrated on local multi-ethnic data. A key nuance: it estimates 10-year coronary risk — not stroke or total cardiovascular risk."
      - text: "It is the same US equation kept unchanged, and it estimates total stroke risk"
        correct: false
        feedback: "It is not the unchanged US tool — it was recalibrated locally precisely because the US equations mis-estimate Asian risk. And it estimates coronary risk, not stroke."
      - text: "It is recalibrated locally and estimates total cardiovascular risk including stroke"
        correct: false
        feedback: "The recalibration part is right, but the scope is narrower than this: SG-FRS-2023 estimates coronary risk only, not total cardiovascular or stroke risk."
      - text: "It replaces risk estimation entirely with a fixed blood-pressure cut-off"
        correct: false
        feedback: "SG-FRS-2023 is a risk-estimation tool, not a single cut-off. It produces a 10-year coronary risk estimate that then feeds risk-tiered guidance."

  - id: q8
    stem: "A **potassium-based salt substitute** has hard-outcome trial support for cutting sodium. Which patient should you **not** simply advise to switch to it?"
    options:
      - text: "Someone with kidney disease or on an ACE inhibitor, ARB or K-sparer"
        correct: true
        feedback: "Correct. The trial that proved these substitutes work excluded people with serious kidney disease and those on potassium-raising drugs (ACE inhibitors, ARBs, potassium-sparing diuretics), in whom extra potassium can cause dangerous hyperkalaemia. Check for these first, and if in doubt don't — the renal potassium story is owned by the Chronic Kidney Disease chapter."
      - text: "An otherwise healthy adult with hypertension and no kidney problems"
        correct: false
        feedback: "This is exactly the person for whom a potassium salt substitute is a reasonable sodium-cutting lever with hard-outcome support. The caution applies to kidney disease and potassium-raising drugs, which this patient does not have."
      - text: "Someone whose only goal is to season food with less sodium overall"
        correct: false
        feedback: "Wanting less sodium is the reason to consider a substitute, not a reason to avoid it. The real do-not-switch group is defined by kidney disease and potassium-raising medications."
      - text: "A patient who eats out often and finds it hard to cut soup and sauces"
        correct: false
        feedback: "This describes a good candidate for sodium-lowering strategies, not a contraindication. The safety check that changes the advice is kidney disease or potassium-raising drugs."
