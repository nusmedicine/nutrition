# Data for the FatSwap island (Cardiovascular Disease & Hypertension chapter).
# A "replaced with what?" decision widget for the "Fat quality, not quantity" section.
# The learner is cutting saturated fat and must choose the REPLACEMENT. The teaching point:
# what protects the heart is the swap, not the cut — replace saturated fat with unsaturated fat
# (LDL down, events down); replace it with refined carbohydrate/sugar and the benefit vanishes.
# Single-select. Pure content — no asset paths.
id: fat-swap
title: "Replaced with what?"
intro: >-
  You're cutting back on saturated fat (butter, palm oil, fatty meat, coconut milk). What you
  replace it with decides whether the heart benefits. Pick a replacement and see what happens.
# Each option: label = the replacement; example = everyday foods; effect = down|neutral|up
# (direction of LDL / cardiovascular events); note = one-line why. `best` flags the strongest swap.
options:
  - id: unsaturated-oils
    label: "Unsaturated plant oils"
    example: "olive, canola, sunflower oil"
    effect: down
    best: true
    note: >-
      Swapping saturated for polyunsaturated fat lowers LDL cholesterol and cuts cardiovascular
      events — a change roughly the size of a statin. This is the swap the trials reward.
  - id: nuts-seeds-fish
    label: "Nuts, seeds and oily fish"
    example: "walnuts, flaxseed, salmon, mackerel"
    effect: down
    note: >-
      Whole-food sources of unsaturated fat lower LDL and events too — and they are the backbone of
      the Mediterranean pattern. Recommend the oily fish itself, not a fish-oil capsule.
  - id: refined-carb
    label: "Refined carbohydrate & sugar"
    example: "white bread, sugary drinks, biscuits"
    effect: neutral
    note: >-
      Trade saturated fat for refined starch and sugar and the benefit disappears — LDL is roughly
      unchanged and it can worsen triglycerides. This is why "saturated fat has been exonerated"
      headlines mislead: they never said what the fat was replaced with.
  - id: nothing
    label: 'Nothing — just "eat less fat"'
    example: "smaller portions, same foods"
    effect: neutral
    note: >-
      Cutting fat without a better replacement does little on its own. It is the quality of the swap,
      not the size of the cut, that moves LDL and events.
# Verdict text keyed by effect. Shown in an aria-live region after a choice is made.
verdicts:
  down:
    label: "LDL down, events down"
    text: >-
      Good swap. Replacing saturated fat with unsaturated fat lowers LDL cholesterol and cuts
      cardiovascular events — the swap, not the cut, is what protects the heart.
  neutral:
    label: "No real benefit"
    text: >-
      Little or no benefit. Because the replacement is not unsaturated fat, LDL and events barely
      move — the swap, not the cut, is what protects the heart.
  up:
    label: "Can worsen risk"
    text: >-
      This replacement can push risk the wrong way — the swap, not the cut, is what protects the heart.
prompt: "Choose a replacement to see whether the heart benefits."
caption: >-
  Ask "replaced with what?" of every swap. Butter or palm oil for olive or canola oil, yes; butter
  for white bread, no. The swap, not the cut, is what protects the heart.
credit: "Replacement effects after Mensink 2003, Hooper 2020 and Sacks 2017 (AHA)."
