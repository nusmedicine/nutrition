id: scfa-flow
title: "Fibre → short-chain fatty acids"
intro: >
  The microbiome's signature job: fermenting the fibre your own enzymes could not digest into
  short-chain fatty acids (SCFAs) that fuel your gut and signal to your body. Step through it — what
  arrives, who ferments it, what comes out (in roughly 60:20:20), and where each product goes. Click
  any short-chain fatty acid or its destination for detail.
credit: "Diagram: Health in Medicine, CC BY-SA 4.0."
viewBox: "0 0 770 430"

# cargo colours (also used for the SCFA nodes and their fate arrows)
cargo:
  acetate: "#1f9d6b"
  propionate: "#b9691d"
  butyrate: "#8a6fc0"
  gas: "#7a8791"
  substrate: "#08503f"

nodes:
  - id: substrate
    label: "Fibre + resistant starch"
    sub: "escaped digestion (Ch.5)"
    x: 100
    y: 215
    kind: substrate
    detail: "Dietary fibre, resistant starch and some oligosaccharides that your own small-intestinal enzymes cannot break down travel undigested to the colon."
  - id: ferment
    label: "Anaerobic bacteria"
    sub: "ferment — no oxygen"
    x: 265
    y: 215
    kind: ferment
    detail: "Colonic bacteria ferment the fibre without oxygen — bacterial metabolism, not your digestion. This is why it happens in the colon, not the small intestine."
  - id: acetate
    label: "Acetate"
    sub: "~60%"
    x: 455
    y: 95
    kind: scfa
    pct: 60
    detail: "The most abundant SCFA. Poorly extracted by the liver, so it travels systemically to peripheral tissues (and feeds other bacteria)."
  - id: propionate
    label: "Propionate"
    sub: "~20%"
    x: 455
    y: 215
    kind: scfa
    pct: 20
    detail: "Taken up by the liver via the portal vein, where it is a gluconeogenic substrate — a raw material for making glucose (Chapter 6)."
  - id: butyrate
    label: "Butyrate"
    sub: "~20% — the star"
    x: 455
    y: 335
    kind: scfa
    pct: 20
    detail: "The LEAST abundant SCFA but the most important locally: the preferred fuel of the colonocytes, supplying the bulk of the colon lining's energy and supporting the mucus barrier."
  - id: gas
    label: "Gas"
    sub: "H₂, CO₂, CH₄"
    x: 265
    y: 355
    kind: gas
    detail: "By-products of fermentation. Too much fermentable substrate at once (undigested lactose, beans, onions, FODMAPs) means more gas — the bloating mechanism Chapter 5 deferred. Methanogens turn H₂ into CH₄."
  - id: systemic
    label: "Systemic"
    sub: "peripheral tissues"
    x: 660
    y: 95
    kind: fate
    detail: "Acetate reaches muscle, brain and other tissues, and other gut bacteria — the most far-travelling SCFA."
  - id: liver
    label: "Liver"
    sub: "gluconeogenesis"
    x: 660
    y: 215
    kind: fate
    detail: "Propionate arrives by the portal vein and feeds into glucose production (Chapter 6)."
  - id: colonocytes
    label: "Colonocytes"
    sub: "colon lining fuel"
    x: 660
    y: 335
    kind: fate
    detail: "Butyrate is burned right here by the cells lining the colon — their preferred fuel. The payoff of eating fibre."

edges:
  - { from: substrate,  to: ferment,     step: 1, kind: substrate }
  - { from: ferment,    to: acetate,     step: 2, kind: acetate }
  - { from: ferment,    to: propionate,  step: 2, kind: propionate }
  - { from: ferment,    to: butyrate,    step: 2, kind: butyrate }
  - { from: ferment,    to: gas,         step: 3, kind: gas, label: "+ gas" }
  - { from: acetate,    to: systemic,    step: 4, kind: acetate }
  - { from: propionate, to: liver,       step: 4, kind: propionate }
  - { from: butyrate,   to: colonocytes, step: 4, kind: butyrate }

steps:
  - title: "Fibre reaches the colon"
    caption: >
      Dietary fibre and resistant starch escape digestion in the small intestine (Chapter 5) and
      arrive, intact, in the colon — the body's fermentation chamber.
  - title: "Bacteria ferment it into SCFAs"
    caption: >
      Anaerobic colonic bacteria ferment the fibre — without oxygen — into three short-chain fatty
      acids in an approximate ratio of 60:20:20 (acetate : propionate : butyrate). It varies with
      diet and site, so treat it as "roughly 60:20:20."
  - title: "…and gas"
    caption: >
      Fermentation also releases hydrogen, carbon dioxide and (in some people) methane. A big load
      of fermentable substrate at once means more gas — the bloating mechanism. Usually a sign the
      system is working, not failing.
  - title: "Each SCFA has a fate"
    caption: >
      Acetate travels systemically; propionate goes to the liver (gluconeogenesis, Chapter 6); and
      butyrate — the least abundant — is burned locally as the colonocytes' preferred fuel. Note that
      abundance is not importance: the star, butyrate, is the smallest share.
