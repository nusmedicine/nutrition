id: appetite-thermostat
title: "The appetite thermostat"
intro: >
  The hypothalamic arcuate nucleus balances an accelerator (AgRP/NPY, "eat") against a brake
  (POMC/CART → α-MSH, "stop"), which meet at one switch (MC4R) to set hunger. Step through the states
  and watch the balance shift — and see how a GLP-1 medicine plugs into the very same circuit. Click any
  part for detail.
credit: "Diagram: Health in Medicine, CC BY-SA 4.0."
viewBox: "0 0 720 380"

# Peripheral input signals shown pressing the accelerator or the brake.
signals:
  - { id: leptin,  label: "Leptin (fat gauge)", acts: brake }
  - { id: ghrelin, label: "Ghrelin (hunger)",   acts: accel }
  - { id: glp1,    label: "GLP-1 drug",          acts: brake }

states:
  - id: fasted
    label: "Fasted"
    when: "between meals / energy low"
    accel: 80
    brake: 25
    hunger: 78
    inputs:
      leptin: { dir: down, note: "Low-ish (or falling) — eases off the brake." }
      ghrelin: { dir: up, note: "High before a meal — presses the accelerator." }
    summary: >
      Energy is low, so ghrelin is high and leptin eases: the accelerator (AgRP/NPY) fires, the brake
      (POMC) quietens, and MC4R output swings toward hunger. This is normal, appropriate hunger.
    detail:
      accel: "AgRP/NPY neurons fire strongly — the orexigenic drive. They also directly inhibit the POMC brake."
      brake: "POMC/CART neurons are quiet, so little α-MSH is made."
      mc4r: "With little α-MSH and lots of AgRP blocking it, MC4R output is low → hunger high."
      hunger: "High — you are driven to seek and start a meal."

  - id: fed
    label: "Just ate"
    when: "after a meal"
    accel: 25
    brake: 82
    hunger: 22
    inputs:
      ghrelin: { dir: down, note: "Falls after eating." }
      leptin: { dir: up, note: "Steady/adequate — presses the brake." }
    summary: >
      Food has arrived: ghrelin falls, gut satiety peptides (CCK, GLP-1, PYY) and stomach stretch signal
      fullness, and leptin's background tone holds. The brake (POMC → α-MSH) wins, MC4R output says stop.
    detail:
      accel: "AgRP/NPY drive is suppressed by the incoming satiety signals."
      brake: "POMC/CART neurons fire, making α-MSH — the 'stop eating' signal."
      mc4r: "α-MSH activates MC4R → satiety output high → meal ends."
      hunger: "Low — the meal is brought to a close (satiation), and the next is delayed (satiety)."

  - id: postloss
    label: "After weight loss"
    when: "weeks–months after dieting"
    accel: 90
    brake: 18
    hunger: 92
    inputs:
      leptin: { dir: down, note: "Falls DISPROPORTIONATELY low — the brain reads 'starving'." }
      ghrelin: { dir: up, note: "Rises and stays elevated for a year or more." }
    summary: >
      This is the defended-weight state. Fat mass shrank, so leptin fell far — the brain reads starvation,
      ghrelin rises, and hunger is driven HIGHER than a normal fast. Energy expenditure also drops more
      than body size predicts (adaptive thermogenesis). The biology is pushing to regain the weight.
    detail:
      accel: "AgRP/NPY drive is turned up hard by the low-leptin 'starvation' signal — stronger than an ordinary fast."
      brake: "POMC is suppressed — the brake is released."
      mc4r: "Output swings far toward hunger; this persists for a year or more after the weight loss."
      hunger: "Very high — plus a lowered metabolic rate. This is regain pressure, not a willpower failure."

  - id: glp1
    label: "On a GLP-1 drug"
    when: "GLP-1 receptor agonist"
    accel: 30
    brake: 88
    hunger: 28
    gastric: true
    inputs:
      glp1: { dir: up, note: "The drug is a long-acting GLP-1 that keeps pressing the brake." }
      ghrelin: { dir: down, note: "Eating less, so ghrelin stays lower." }
    summary: >
      The medicine amplifies the body's OWN satiety signalling: it tips the arcuate toward the POMC brake
      and slows the stomach, so hunger falls and meals end sooner — plugging into the same circuit the
      chapter drew. But stop the drug and the defended set-point reasserts: the weight returns.
    detail:
      accel: "The drug shifts the balance away from AgRP/NPY drive."
      brake: "GLP-1 receptors on the satiety side are held 'on' continuously — the brake stays pressed."
      mc4r: "Sustained satiety output; hunger and meal size fall."
      hunger: "Low while the drug is present. It opposes the defended set-point rather than removing it — stop the drug and hunger (and weight) return."
