id: gut-journey
title: "Follow the food: a journey through the gut"
image: /figures/anatomy/digestive-apparatus.png
imageBox: "0 0 665 2499"
credit: "Illustration: Servier Medical Art (smart.servier.com), CC BY-SA 3.0."
intro: >
  Click each organ to see what happens to your meal there — how it is moved,
  broken down, and (in the small intestine) absorbed. The tube runs from mouth
  to anus; four accessory organs (salivary glands, liver, gallbladder, pancreas)
  add their juices along the way.
footnote: >
  Recognition-level overview. Absorption sites for specific nutrients (iron, B12,
  calcium) are detailed in Chapter 4; what the liver does with absorbed nutrients
  is Chapter 6; the gut microbiome is Chapter 7.
organs:
  - id: mouth
    name: "Mouth"
    kind: tube
    hx: 215
    hy: 370
    hr: 100
    what: "Teeth grind food and the tongue mixes it with saliva into a soft bolus you can swallow."
    secretes: "Salivary amylase begins digesting starch; a little lingual lipase starts on fat."
    note: "Chewing is mechanical digestion — more chewing means more surface area for enzymes to work on."
  - id: salivary-glands
    name: "Salivary glands"
    kind: accessory
    hx: 300
    hy: 495
    hr: 50
    what: "Three pairs (parotid, submandibular, sublingual) release about 1–1.5 litres of saliva a day into the mouth."
    secretes: "Salivary amylase (starch), lingual lipase (fat), and mucus to lubricate the bolus."
  - id: oesophagus
    name: "Oesophagus"
    kind: tube
    hx: 345
    hy: 760
    hr: 70
    what: "A muscular conduit — no digestion here. Peristalsis (travelling waves of muscle) pushes the bolus down to the stomach."
    note: "The lower oesophageal sphincter guards the entrance to the stomach; when it leaks, stomach acid rises and causes heartburn (reflux)."
  - id: stomach
    name: "Stomach"
    kind: tube
    hx: 455
    hy: 1285
    hr: 112
    what: "Stores, churns, and starts protein digestion. It empties over a few hours — a fatty or large meal empties more slowly."
    secretes: "Parietal cells make hydrochloric acid (very acidic, pH ~1.5–3.5) plus intrinsic factor; chief cells make pepsin, which cuts protein into peptides."
    hormone: "Gastrin (from G cells) drives acid secretion; the acid then activates pepsin."
    note: "The intrinsic factor made here is needed to absorb vitamin B12 much further along, in the ileum."
  - id: liver
    name: "Liver"
    kind: accessory
    hx: 245
    hy: 1150
    hr: 120
    what: "Continuously makes bile, and receives all the nutrient-rich blood draining from the gut through the portal vein."
    secretes: "Bile — a detergent that emulsifies fat into tiny droplets so enzymes can reach it. (What the liver does with absorbed nutrients is Chapter 6.)"
  - id: gallbladder
    name: "Gallbladder"
    kind: accessory
    hx: 300
    hy: 1320
    hr: 46
    what: "Stores and concentrates bile between meals, then squeezes it into the duodenum when a fatty meal arrives."
    hormone: "CCK (released by the duodenum when fat and protein arrive) is the signal that makes it contract."
    note: "Losing weight very rapidly can trigger gallstones — one reason to aim for slow and steady."
  - id: pancreas
    name: "Pancreas"
    kind: accessory
    hx: 330
    hy: 1470
    hr: 60
    what: "The digestive workhorse: it pours about 1.5 litres a day of enzyme- and bicarbonate-rich juice into the duodenum."
    secretes: "Amylase, lipase (+colipase), and protein-cutting enzymes made in an inactive form; bicarbonate neutralises the acid arriving from the stomach."
    hormone: "Secretin triggers the bicarbonate 'antacid'; CCK triggers the enzymes."
    note: "The protein enzymes are 'safety-locked' and only switched on once they reach the gut — so the pancreas does not digest itself."
  - id: small-intestine
    name: "Small intestine"
    kind: tube
    hx: 345
    hy: 1945
    hr: 150
    what: "The main event (~3 m: duodenum → jejunum → ileum). Bile and pancreatic juice finish digestion, brush-border enzymes make the final cut, and nutrients are absorbed across a huge folded surface."
    secretes: "Brush-border enzymes on the villi: lactase, sucrase and maltase (sugars) and peptidases (peptides) — the last snip before absorption."
    absorbs: "Sugars and amino acids into portal blood; fats via micelles → chylomicrons → lymph. Iron is taken up in the duodenum; vitamin B12 (with intrinsic factor) and recycled bile salts at the terminal ileum."
    note: "Folds × villi × microvilli give roughly 30 m² of surface — about half a badminton court (not the 'tennis court' many textbooks claim)."
  - id: large-intestine
    name: "Large intestine"
    kind: tube
    hx: 500
    hy: 1840
    hr: 92
    what: "Reabsorbs water and electrolytes from what's left, compacts it into stool, and stores it until defecation."
    note: "Resident bacteria ferment leftover fibre (and any undigested lactose, producing gas) — that story belongs to Chapter 7."
