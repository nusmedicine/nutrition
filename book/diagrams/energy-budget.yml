# Data for the EnergyBudget island (Chapter 2, Energy Balance).
# An interactive Mifflin–St Jeor BMR/TEE estimator that splits total expenditure into
# BMR + TEF + physical activity. No asset paths — pure config.
id: energy-budget
title: "Estimate a person's energy needs"
intro: >-
  Enter a person's details and pick how active they are. The tool estimates their basal
  metabolic rate (BMR) with the Mifflin–St Jeor equation, scales it by an activity factor to
  get total daily needs, and shows where that energy goes. Notice two things: BMR is the
  largest slice, and physical activity is the part that changes most.

# Thermic effect of food ≈ 10% of total energy expenditure.
tefFraction: 0.10

# Physical-activity level (PAL) multipliers, BMR → total energy expenditure.
activity:
  - id: sedentary
    label: Sedentary
    pal: 1.4
    note: "Desk-bound, little deliberate exercise."
  - id: light
    label: Lightly active
    pal: 1.6
    note: "On your feet, or light exercise a few days a week."
  - id: moderate
    label: Moderately active
    pal: 1.75
    note: "Regular exercise, or a physically active job."
  - id: active
    label: Very active
    pal: 2.0
    note: "Hard daily training or heavy physical work."

# Preset people to load. The first is the chapter's worked example (Mdm Tan).
presets:
  - id: default
    label: "Worked example (52 y woman)"
    sex: female
    weight: 68
    height: 157
    age: 52
    activity: sedentary

credit: "Mifflin–St Jeor equation (Mifflin et al., 1990). Estimates only — individual needs vary."
