project:
  type: book
  output-dir: _book
  resources:
    - assets/**
    - cases/**
    - quizzes/**
    - diagrams/**
    - structures/**
    - figures/**

book:
  title: "Health in Medicine"
  subtitle: "Nutrition — an interactive companion for first-year medical students"
  author: "Dept of Biochemistry, NUS Medicine"
  search: true
  chapters:
    - index.qmd
    - part: "I · The metabolic & physiological basis"
      chapters:
        - chapters/01-why-nutrition-matters.qmd
        - chapters/energy-balance.qmd
        - chapters/macronutrients.qmd
        - chapters/04-micronutrients-hydration.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    html-math-method: katex
    lightbox: true
    # Components bundle (built by /components via Vite into book/assets/).
    # Loaded site-wide so interactive islands hydrate on every page.
    include-in-header:
      text: |
        <link rel="stylesheet" href="/assets/components.css">
    include-after-body:
      text: |
        <script type="module" src="/assets/components.js"></script>
