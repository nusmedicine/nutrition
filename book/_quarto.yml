project:
  type: book
  output-dir: _book
  resources:
    - assets/**
    - cases/**
    - quizzes/**
    - diagrams/**
    - structures/**
    - figures/**

book:
  title: "Health in Medicine"
  subtitle: "Nutrition — an interactive companion for first-year medical students"
  author: "Dept of Biochemistry, NUS Medicine"
  search: true
  chapters:
    - index.qmd
    - part: "I · The metabolic & physiological basis"
      chapters:
        - chapters/01-why-nutrition-matters.qmd
        - chapters/energy-balance.qmd
        - chapters/macronutrients.qmd
        - chapters/04-micronutrients-hydration.qmd
        - chapters/digestion-absorption.qmd
        - chapters/integrative-metabolism.qmd
        - chapters/gut-microbiome.qmd
        - chapters/appetite-weight-regulation.qmd
    - part: "II · Across the life stages"
      chapters:
        - chapters/infancy-early-childhood.qmd
        - chapters/childhood-adolescence.qmd
        - chapters/adulthood-working-life.qmd
        - chapters/pregnancy-lactation.qmd
        - chapters/menopause-midlife.qmd
        - chapters/healthy-ageing.qmd
    - part: "III · Advising the healthy"
      chapters:
        - chapters/dietary-guidelines-patterns.qmd
        - chapters/evidence-vs-hype.qmd
        - chapters/06-dietary-assessment.qmd
        - chapters/behaviour-change-counselling.qmd
    - part: "Integrated cases"
      chapters:
        - chapters/cases.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    html-math-method: katex
    lightbox: true
    # Components bundle (built by /components via Vite into book/assets/).
    # Loaded site-wide so interactive islands hydrate on every page.
    include-in-header:
      text: |
        <link rel="stylesheet" href="/assets/components.css">
        <!-- Simulated-patient endpoint. Disabled by default (patient-chat degrades to
             a placeholder + fallbackGoto). For production, set endpoint to the proxy
             (e.g. https://patient-api.phm.nusmed.space) and enabled:true. For local dev,
             append ?patient-llm=http://localhost:8787 to any page (localhost-only). -->
        <meta name="patient-llm" content='{"endpoint":"https://patient-api.phm.nusmed.space","enabled":true}'>
    include-after-body:
      text: |
        <script type="module" src="/assets/components.js"></script>
