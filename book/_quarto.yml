project:
  type: book
  output-dir: _book
  resources:
    - assets/**
    - cases/**
    - quizzes/**

book:
  title: "Health in Medicine"
  subtitle: "Nutrition & Metabolism — an interactive companion"
  author: "Department of ___, NUS"
  search: true
  chapters:
    - index.qmd
    - chapters/macronutrients.qmd
    - chapters/energy-balance.qmd

bibliography: references.bib

format:
  html:
    theme: cosmo
    toc: true
    number-sections: true
    html-math-method: katex
    # Components bundle (built by /components via Vite into book/assets/).
    # Loaded site-wide so interactive islands hydrate on every page.
    include-in-header:
      text: |
        <link rel="stylesheet" href="/assets/components.css">
    include-after-body:
      text: |
        <script type="module" src="/assets/components.js"></script>
